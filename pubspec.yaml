name: vibelytics
description: 'AI-powered profile analysis, photo enhancement, and community photo rating.'
publish_to: 'none'

version: 1.0.6+11

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.9
  lucide_icons_flutter: ^3.1.14
  flutter_svg: ^2.3.0
  google_fonts: ^8.1.0
  sign_in_with_apple: ^8.0.0
  sizer: ^3.1.3
  device_info_plus: ^13.1.0

  # Network & API
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^7.1.1

  # Images & Media
  cached_network_image: ^3.4.1
  image_picker: ^1.2.2
  just_audio: ^0.10.5

  # Storage
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5

  # Authentication
  google_sign_in: ^7.2.0

  # UI Components
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  flutter_staggered_grid_view: ^0.7.0
  infinite_scroll_pagination: ^5.1.1

  # Utilities
  url_launcher: ^6.3.2
  gal: ^2.3.0
  share_plus: ^13.1.0
  logger: ^2.7.0

  # Localization
  easy_localization: ^3.0.8

  # Performance
  flutter_displaymode: ^0.7.0

  # Background Processing
  workmanager: ^0.9.0+3
  wakelock_plus: ^1.6.1

  # Notifications
  flutter_local_notifications: ^22.0.0-dev.3
  flutter_timezone: ^5.0.2

  # In-App Purchases
  purchases_flutter: ^10.1.0

  # Deep Linking
  app_links: ^7.0.0

  # Permissions
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

  # Fonts are loaded via google_fonts package (see lib/core/tokens/typography.dart)
